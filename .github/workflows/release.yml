name: Release

on:
  push:
    tags:
      - 'v[0-9]*'   # triggers on v1.0.6, v2.0.0, etc.

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi        # optional: add a GitHub environment for approval gate
    permissions:
      id-token: write        # required for PyPI Trusted Publishing (no API token needed)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history so setuptools_scm can derive the version from the tag

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build package
        run: python -m build

      - name: Check dist
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses Trusted Publishing (OIDC) — no TWINE_PASSWORD secret required.
        # Set up Trusted Publishing once at pypi.org:
        #   Project → Manage → Publishing → Add publisher
        #   Owner: VaishnavGhenge  Repo: django-silky  Workflow: release.yml