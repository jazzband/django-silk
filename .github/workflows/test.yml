name: Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    name: Python ${{ matrix.python-version }} / Django ${{ matrix.django-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
        django-version: ['5.1', '5.2']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ matrix.python-version }}-django${{ matrix.django-version }}-${{ hashFiles('setup.py') }}
          restore-keys: ${{ matrix.python-version }}-django${{ matrix.django-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "Django==${{ matrix.django-version }}.*" pytest pytest-django pytest-cov

      - name: Install package
        run: python -m pip install -e .

      - name: Run tests
        run: python -m pytest project/tests/ -q
        env:
          DB_ENGINE: sqlite3